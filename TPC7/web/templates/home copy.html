{% extends 'layout.html' %}

{% block head %}
    <title> Home Page </title>
    <style>
        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
{% endblock %}

{% block body %}
<div class="container">
    <div class="card text-center" style="width: 36rem;">
        <div class="card-body">
            <h5 class="card-title">Dicionário Médico</h5>
            <p class="card-text">Pesquise o conceito médico que pretende ou visualize todos os conceitos disponíveis.</p>
            <a href="/conceitos" class="btn btn-primary mb-3">Lista de conceitos</a>
            
            <div class="input-group mb-3">
                <input type="text" id="inputPesquisa" class="form-control" placeholder="Insira o conceito" aria-label="conceito_pesquisa">
                <button class="btn btn-primary" type="button" id="btnPesquisar">Pesquisar</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Termo não encontrado</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="mb-0">O termo <strong id="termoErrado"></strong> não existe no nosso dicionário.</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
      </div>
    </div>
  </div>
</div>

<script>
    // 1. Converter a lista do Python para um Array JavaScript
    const listaConceitos = {{ conceitos | tojson }};
    
    // 2. Inicializar o Modal do Bootstrap
    const modalErro = new bootstrap.Modal(document.getElementById('exampleModal'));

    document.getElementById('btnPesquisar').addEventListener('click', function() {
        const termo = document.getElementById('inputPesquisa').value.trim();
        
        if (termo === "") return;

        // 3. Verificar se o termo existe na lista
        if (listaConceitos.includes(termo)) {
            // Se existe, redireciona para a página do conceito
            window.location.href = "/conceitos/" + encodeURIComponent(termo);
        } else {
            // Se não existe, preenche o span e mostra o modal
            document.getElementById('termoErrado').innerText = termo;
            modalErro.show();
        }
    });
</script>

{% endblock %}
